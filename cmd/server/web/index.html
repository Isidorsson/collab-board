<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>collab-board</title>
<link rel="stylesheet" href="/style.css" />
</head>
<body>
<dialog id="join">
  <form method="dialog">
    <h1>collab-board</h1>
    <p>Real-time whiteboard. Pick a room code — anyone with the same code joins the same board.</p>
    <label>Room code <input id="room" autocomplete="off" required minlength="2" maxlength="32" /></label>
    <label>Your name <input id="name" autocomplete="off" required minlength="1" maxlength="24" /></label>
    <button>Join</button>
  </form>
</dialog>

<header>
  <span class="brand">collab-board</span>
  <span id="roomLabel"></span>
  <span id="status" class="status disconnected">offline</span>
</header>

<main>
  <canvas id="board"></canvas>
  <aside>
    <section>
      <h2>Online</h2>
      <ul id="presence"></ul>
    </section>
    <section class="chat">
      <h2>Chat</h2>
      <div id="messages"></div>
      <form id="chatForm">
        <input id="chatInput" placeholder="Say something…" autocomplete="off" maxlength="200" />
      </form>
    </section>
  </aside>
</main>

<script src="/app.js"></script>
</body>
</html>
